project:
  name: financial-watermark-detector
  task: financial-text-llm-watermarking

data:
  input_path: data/data.csv
  fallback_input_path: data/data.cvs
  text_column: Sentence

watermark:
  secret_key: fin-watermark-2026
  strategy: lexical-greenlist

detection:
  model: logistic_regression
  test_size: 0.2
  random_state: 42

artifacts:
  model_path: models/watermark_detector.joblib
  dataset_path: data/watermark_detection_dataset.csv
  metrics_path: reports/watermark_metrics.json
